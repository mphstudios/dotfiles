# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

command_timeout = 3000

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$nodejs\
$python\
$ruby\
$direnv\
$env_var\
$mise\
$custom\
$sudo\
$line_break\
$jobs\
$os\
$container\
$shell\
$character
"""

right_format = '$cmd_duration $status'

continuation_prompt = '[↪](white) '

palette = 'gradoo'

[palettes.gradoo]
# TODO

[character]
error_symbol = '[](white)' # nf-cod-error
success_symbol = '[❯](white)'
vimcmd_symbol = '[❮](bold green)'
vimcmd_replace_symbol = '[❮](bold purple)'
vimcmd_visual_symbol = '[❮](bold yellow)'

[cmd_duration]
format = '[$duration]($style)'
style = 'bold yellow'

[directory]
format = '[$path]($style)[$read_only]($read_only_style) '
style = 'bold cyan'
read_only = ''
read_only_style = 'bold red'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) '
repo_root_style = 'underline white'
truncation_length = 8
truncation_symbol = '…/'

[docker_context]
disabled = true

[git_branch]
style = 'bold magenta'
symbol = ''
format = 'on [$symbol $branch(:$remote_branch)]($style) '
truncation_symbol = '…'

[git_commit]
format = '[$hash \[$tag\]]($style) '
tag_symbol = '' # nf-oct-tag

[git_state]
bisect = 'BISECTING'
cherry_pick = '🍒'
merge = 'MERGING'
rebase = 'REBASING'
revert = 'REVERTING'
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
format = '([$all_status$ahead_behind](white)) '
ahead = '🢁${count}' # nf-cod-git_commit
behind = '🢃${count}' # nf-cod-git_commit
conflicted = '' # nf-fa-not_equal
deleted = '❕'
diverged = '🢁🢃' # nf-cod-git_commit
modified = '🗯️'
renamed = '' # nf-oct-diff_renamed
staged = '[+$count](green)'
stashed = ' ' # nf-cod-bookmark
untracked = '❔'
up_to_date = '' # nf-cod-pass

[hostname]
disabled = false
format = '[$ssh_symbol](bold blue)[$hostname]($style) '
ssh_only = false
ssh_symbol = 'SSH:'
style = 'yellow'

[mise]
disabled = false
format = '[$symbol $health]($style) '
healthy_symbol = '󱐋'
style = 'bold purple'
symbol = 'mise'
unhealthy_symbol = '' # nf-oct-alert

[nodejs]
format = '[$symbol $version]($style) '
symbol = 'Node'
version_format = '${raw}'

[python]
format = '[$symbol $version]($style) '
pyenv_version_name = true
symbol = 'Python'
version_format = '${raw}'

[ruby]
format = '[$symbol $version]($style) '
symbol = 'Ruby'
version_format = '${raw}'

[shell]
disabled = false
format = '[$indicator]($style)'
style = 'white'
bash_indicator = '' # nf-seti-shell
fish_indicator = "🐟"
nu_indicator = '' # default indicator
unknown_indicator = '❓'
zsh_indicator = '%'

[sudo]
disabled = false
format = '[as $symbol]($style)'
style = 'bold green'
symbol = '' # nf-dev-apple

[username]
disabled = true
format = '[$user]($style)'
show_always = true
style_root = 'red'
style_user = 'white'
